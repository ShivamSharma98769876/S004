# Optional: combined Docker image (see docs/azure-deployment.md). Skip if you use two Azure Web Apps (code only).
name: Azure container image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: s004-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Example: push to Azure Container Registry (uncomment + set secrets)
