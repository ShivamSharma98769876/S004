# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions
#
# Required repo secrets (same names as azure-webapps-deploy-no-oryx.yml for the API):
# - AZURE_WEBAPP_API_NAME — exact App Service name from Azure Portal → Overview (e.g. s004-xxxxx).
# - AZURE_WEBAPP_API_PUBLISH_PROFILE — full .PublishSettings XML; publishUrl must be <name>.scm.azurewebsites.net
#   (not *.scm.<region>-01.azurewebsites.net — invalid DNS, getaddrinfo ENOTFOUND).
# If you used Azure Deployment Center before, copy the publish profile XML into AZURE_WEBAPP_API_PUBLISH_PROFILE.

name: Build and deploy Python app to Azure Web App - S004

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # API code and requirements live under backend/ (not repo root).
      # Oryx on App Service runs pip from the deployed root; that root must be backend/ (app/, requirements.txt, startup.sh).
      - name: Create and Start virtual environment and Install dependencies
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      # Zip backend/ so deploy sees app/, requirements.txt, startup.sh at zip root (webapps-deploy is reliable with a .zip path).
      - name: Zip backend for Azure
        run: |
          cd backend
          zip -r ../backend-deploy.zip . \
            -x 'antenv/*' -x 'antenv/**' \
            -x '**/__pycache__/*' -x '**/*.pyc' \
            -x 'tests/*' -x 'tests/**'

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: backend-deploy.zip

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: 'Deploy to Azure Web App'
        uses: Azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_API_PUBLISH_PROFILE }}
          package: backend-deploy.zip