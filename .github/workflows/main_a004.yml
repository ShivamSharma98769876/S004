# Combined Next.js + FastAPI image (repo-root Dockerfile → nginx on 8080).
# Azure: Linux Web App configured for **custom container** (not Python code stack).
#
# GitHub Actions secrets:
#   ACR_LOGIN_SERVER          e.g. myregistry.azurecr.io
#   ACR_USERNAME              ACR username (or appId for SP with AcrPush)
#   ACR_PASSWORD              ACR password (or service principal secret)
#   AZURE_WEBAPP_NAME         Web App name (Overview)
#   AZURE_WEBAPP_PUBLISH_PROFILE  Full .PublishSettings XML (Linux: set WEBSITE_WEBDEPLOY_USE_SCM=true on the app before download, per Microsoft)

name: Build and deploy Docker image to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: s004-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Web App (container)
        uses: Azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
