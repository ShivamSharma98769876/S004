# Optional: deploy pre-built ZIPs without Oryx (no SCM_DO_BUILD_DURING_DEPLOYMENT on the Web Apps).
# Prerequisites:
# - API and UI Web Apps do NOT have SCM_DO_BUILD_DURING_DEPLOYMENT=true (remove or omit the setting).
# - API startup: bash startup.sh (startup.sh picks up .python_packages when present).
# - UI startup: node server.js (this workflow zips .next/standalone as site root).
# Secrets: AZURE_WEBAPP_API_NAME, AZURE_WEBAPP_API_PUBLISH_PROFILE, AZURE_WEBAPP_UI_NAME,
#          AZURE_WEBAPP_UI_PUBLISH_PROFILE, NEXT_PUBLIC_API_URL (https URL of API, no trailing slash).

name: Azure Web Apps deploy (no Oryx)

on:
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies into .python_packages
        working-directory: backend
        run: pip install -r requirements.txt --target ".python_packages"
      - name: Zip API
        working-directory: backend
        run: |
          zip -r ../api-deploy.zip . \
            -x 'tests/*' -x '**/__pycache__/*' -x '**/*.pyc' -x '.venv/*'
      - uses: Azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_API_PUBLISH_PROFILE }}
          package: api-deploy.zip

  deploy-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build Next.js standalone
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          npm ci
          npm run build
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
      - name: Zip UI (standalone root)
        working-directory: frontend/.next/standalone
        run: zip -r ../../../ui-deploy.zip .
      - uses: Azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_UI_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_UI_PUBLISH_PROFILE }}
          package: ui-deploy.zip
