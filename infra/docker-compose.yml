version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: s004-postgres
    environment:
      POSTGRES_DB: tradingpro
      POSTGRES_USER: shivams
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: s004-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../../..
      dockerfile: prd_v2_5_task_pack/implementation/W09/docker/backend.Dockerfile
    container_name: s004-backend
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://shivams:changeme@postgres:5432/tradingpro
      REDIS_URL: redis://redis:6379/0
      API_V1_PREFIX: /api
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../../..
      dockerfile: prd_v2_5_task_pack/implementation/W09/docker/frontend.Dockerfile
    container_name: s004-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:latest
    container_name: s004-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: s004-grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"

volumes:
  postgres_data:

