apiVersion: apps/v1
kind: Deployment
metadata:
  name: s004-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: s004-backend
  template:
    metadata:
      labels:
        app: s004-backend
    spec:
      containers:
        - name: backend
          image: s004-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: s004-secrets
                  key: database-url
            - name: REDIS_URL
              value: redis://s004-redis:6379/0
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: s004-backend
spec:
  selector:
    app: s004-backend
  ports:
    - port: 8000
      targetPort: 8000

